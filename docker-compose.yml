services:
  ai-api-stuff:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-api-stuff
    privileged: false

    cap_add:
      - SYS_ADMIN
    shm_size: '2gb' # Для ML-задач это мастхэв, чтобы не было ошибок памяти

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu, utility, compute]
    devices:
      - /dev/nvidia0:/dev/nvidia0       # Прокидываем именно ноду Neptune
      - /dev/nvidiactl:/dev/nvidiactl   # Общий контроллер (нужен всегда)
      - /dev/nvidia-uvm:/dev/nvidia-uvm # Для работы с памятью (нужен всегда)
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools # Добавь этот узел для инструментов мониторинга
  
    environment:
      - NVIDIA_VISIBLE_DEVICES=0 # Явно укажем переменную окружения
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_API_KEY} # берётся из .env в корне — снимает rate-limit при холодной закачке весов
      - COMFYUI_URL=http://comfyui:8188 # куда слать видео-воркфлоу

    ports:
      - 8000:8000

    volumes:
      - .:/root

    depends_on:
      - comfyui

    command: ["fastapi", "run", "main.py", "--port", "8000", "--no-reload"]

    restart: unless-stopped

    # <<: *default-logging

  # ------------------------------------------------------------------------
  # ComfyUI — мотор видео-генерации (fp8_scaled). Делит GPU 0 с ai-api-stuff;
  # наш воркер шлёт сюда воркфлоу и дёргает /free на границах, чтобы отдавать
  # VRAM под картинки/аудио. Порт наружу не обязателен (общаемся по сети compose).
  # ------------------------------------------------------------------------
  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    container_name: comfyui

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']          # та же карта, что у ai-api-stuff
              capabilities: [gpu, utility, compute]
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools

    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      # модели качаются скриптом comfyui/download_models.sh в ./comfyui/models/
      - ./comfyui/models:/opt/ComfyUI/models
      - ./comfyui/output:/opt/ComfyUI/output

    # порт наружу не обязателен (общаемся по сети compose); раскомментируй для веб-UI:
    # ports:
    #   - 8188:8188

    restart: unless-stopped
